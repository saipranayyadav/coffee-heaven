<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Orders | Coffee Heaven</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .order-card{
      background:#fff;
      padding:18px;
      margin-bottom:20px;
      border-radius:14px;
      box-shadow:0 6px 14px rgba(0,0,0,0.15);
    }

    .order-card h3{
      margin-bottom:6px;
      color:#6f4e37;
    }

    .order-card button{
      margin-right:6px;
      margin-top:8px;
      padding:6px 14px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#6f4e37;
      color:#fff;
      font-size:14px;
    }

    .order-card button:hover{
      background:#5a3d2b;
    }

    .status{
      font-weight:bold;
      color:#6f4e37;
    }
  </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
  <h2>☕ Coffee Heaven</h2>
  <a href="/home">Home</a>
  <a href="/upload">Add Item</a>
  <a href="/orders">Orders</a>
  <a href="/">Logout</a>
</div>

<!-- ================= MAIN CONTENT ================= -->
<div class="main">
  <section>
    <h2>📋 Live Customer Orders</h2>
    <div id="orders"></div>
  </section>
</div>

<script>
/* ================= LOAD ORDERS ================= */

function loadOrders(){
  fetch("/api/orders")
    .then(res => res.json())
    .then(data => {
      const ordersDiv = document.getElementById("orders");
      ordersDiv.innerHTML = "";

      if(data.length === 0){
        ordersDiv.innerHTML = "<p>No active orders ☕</p>";
        return;
      }

      data.forEach(order => {
        let total = 0;

        const itemsHTML = order.items.map(item => {
          total += Number(item.price);
          return `<li>${item.name} - ₹${item.price}</li>`;
        }).join("");

        ordersDiv.innerHTML += `
          <div class="order-card">
            <h3>Table ${order.customer.table}</h3>
            <p><b>Customer:</b> ${order.customer.name}</p>
            <p><b>Time:</b> ${order.time}</p>

            <p>
              <b>Status:</b>
              <span class="status">${order.status}</span>
            </p>

            <hr>

            <b>Items:</b>
            <ul>${itemsHTML}</ul>

            <strong>Total: ₹${total}</strong>

            <div>
              <button onclick="updateStatus(${order.id}, 'Preparing')">
                Preparing
              </button>

              <button onclick="updateStatus(${order.id}, 'Served')">
                Served
              </button>

              <button onclick="printBill()">
                Print Bill
              </button>

              <button onclick="completeOrder(${order.id})">
                Complete
              </button>
            </div>
          </div>
        `;
      });
    });
}

/* ================= UPDATE STATUS ================= */

function updateStatus(id, status){
  fetch("/update-status", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, status })
  }).then(loadOrders);
}

/* ================= COMPLETE ORDER ================= */

function completeOrder(id){
  if(!confirm("Mark this order as completed?")) return;

  fetch("/complete-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  }).then(loadOrders);
}

/* ================= PRINT BILL ================= */

function printBill(){
  window.print();
}

/* ================= AUTO REFRESH ================= */

loadOrders();
setInterval(loadOrders, 5000); // refresh every 5 seconds
</script>

</body>
</html>
